name: rnnoise_flutter
description: A Flutter plugin for RNNoise audio denoising and voice activity detection.
version: 1.0.0
homepage: https://github.com/xiph/rnnoise

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.uplift.rnnoise
        pluginClass: RNNoiseFlutterPlugin
      ios:
        pluginClass: RnnoiseFlutterPlugin 