# pubspec.yaml
name: ai_therapist_app
description: A voice-enabled AI therapy app with LLM integration
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  
  # State management
  flutter_bloc: ^8.1.3
  provider: ^6.0.5
  get: ^4.6.5
  
  # Routing and navigation
  go_router: ^12.1.1
  
  # Network and API
  http: ^1.1.0
  dio: ^5.3.2
  
  # Firebase - updated to newer versions
  firebase_core: ^2.24.2
  firebase_auth: ^4.17.4
  firebase_storage: ^11.6.5
  cloud_firestore: ^4.14.0
  firebase_messaging: ^14.9.4
  firebase_analytics: ^10.8.0
  
  # LLM integration
  # Note: Using direct API interactions instead of LangChain packages
  # as some packages aren't available on pub.dev
  
  # Local storage
  shared_preferences: ^2.2.1
  # flutter_secure_storage: ^8.0.0  # Commented out due to Windows compatibility issues
  sqflite: ^2.3.0
  
  # Environment and configuration
  flutter_dotenv: ^5.1.0
  package_info_plus: ^4.2.0
  
  # UI utilities
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  google_fonts: ^5.1.0
  intl: ^0.18.1
  lottie: ^2.7.0
  
  # Audio and voice processing (using system resources)
  permission_handler: ^11.0.0
  path_provider: ^2.1.1
  
  # Utilities
  uuid: ^3.0.7
  get_it: ^7.6.0
  equatable: ^2.0.5
  logger: ^1.4.0
  url_launcher: ^6.1.14
  connectivity_plus: ^4.0.2
  path: ^1.8.3
  timezone: ^0.9.2
  sqflite_common_ffi: ^2.3.5
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  build_runner: ^2.4.6
  mockito: ^5.4.2
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
    - .env
    
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700

# Flutter Launcher Icons configuration
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/icons/app_icon.png"
    background_color: "#FFFFFF"
    theme_color: "#5E72E4"