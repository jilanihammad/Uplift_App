name: ai_therapist_app
description: A voice-enabled AI therapy app with LLM integration
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  flutter_bloc: ^9.1.0  # Updated from ^8.1.3
  provider: ^6.0.5
  get: ^4.6.5

  # Routing and navigation
  go_router: ^15.0.0  # Updated from ^12.1.1

  # Network and API
  http: 1.3.0
  dio: ^5.3.2

  # Firebase - updated to latest versions
  firebase_core: ^3.13.0  # Updated from ^2.24.2
  firebase_auth: ^5.5.2  # Updated from ^4.15.3
  firebase_storage: ^12.4.5  # Updated from ^11.5.6
  cloud_firestore: ^5.6.6  # Updated from ^4.13.6
  firebase_messaging: ^15.2.5  # Updated from ^14.7.9
  firebase_analytics: ^11.4.5  # Updated from ^10.7.4
  google_sign_in: ^6.1.4

  # Local storage
  shared_preferences: ^2.2.1
  sqflite: ^2.3.0

  # Environment and configuration
  flutter_dotenv: ^5.1.0
  package_info_plus: ^8.3.0  # Updated from ^4.2.0

  # UI utilities
  flutter_svg: ^2.0.9
  cached_network_image: ^3.4.1  # Updated from ^3.3.0
  google_fonts: ^6.2.1  # Updated from ^5.1.0
  intl: ^0.20.2  # Updated from ^0.18.1
  lottie: ^3.3.1  # Updated from ^2.7.0

  # Audio and voice processing
  permission_handler: ^12.0.0+1  # Updated from ^11.0.0
  path_provider: ^2.1.1

  # Utilities
  uuid: ^4.5.1  # Updated from ^3.0.7
  get_it: ^8.0.3  # Updated from ^7.6.0
  equatable: ^2.0.5
  logger: ^2.5.0  # Updated from ^1.4.0
  url_launcher: ^6.1.14
  connectivity_plus: ^6.1.3  # Updated from ^4.0.2
  path: ^1.8.3
  timezone: ^0.10.0  # Updated from ^0.9.2
  sqflite_common_ffi: ^2.3.5
  localstorage: ^6.0.0  # Updated from ^4.0.1
  just_audio: ^0.10.0  # Updated from ^0.9.36
  flutter_tts: ^4.2.2
  flutter_local_notifications: ^19.1.0  # Updated from ^18.0.1
  firebase_app_check: ^0.3.2+5

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0  # Updated from ^2.0.0
  build_runner: ^2.4.15  # Updated from ^2.4.6
  mockito: ^5.4.2
  flutter_launcher_icons: ^0.14.3  # Updated from ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
    - .env

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700

# Flutter Launcher Icons configuration
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/icons/app_icon.png"
    background_color: "#FFFFFF"
    theme_color: "#5E72E4"